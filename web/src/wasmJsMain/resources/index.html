<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONI Seed Browser Minter</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        body > canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        #warning {
            display: none;
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div id="root" style="width:100%;height:100%;"></div>
<div style="font-size: medium; text-align: center;">
    <div id="warning">&#9888;&#65039; Sorry, your browser is too old or does not support WebAssembly. &#9888;&#65039;</div>
</div>

<script type="application/javascript">

    const unhandledError = (event, error) => {

        console.error('Unhandled error:', error);

        if (error instanceof WebAssembly.CompileError) {
            document.getElementById("warning").style.display = "initial";
        }
    }

    addEventListener("error", (event) => unhandledError(event, event.error));
    addEventListener("unhandledrejection", (event) => unhandledError(event, event.reason));

    // Worldgen worker bridge
    (function() {
        var worker = null;
        var nextId = 0;
        var results = {};
        var errors = {};

        self.worldgenSendMessage = function(type, coordinate) {
            if (worker === null) {
                worker = new Worker('./worldgen.worker.mjs', { type: 'module' });
                worker.onmessage = function(event) {
                    var data = event.data;
                    if (data.type === 'error') {
                        errors[data.id] = data.error || 'Unknown error';
                    } else {
                        results[data.id] = data.result ?? '';
                    }
                };
                worker.onerror = function(event) {
                    console.error('Worldgen worker error:', event);
                };
            }

            var id = nextId++;
            if (coordinate !== null && coordinate !== undefined) {
                worker.postMessage({ id: id, type: type, payload: { coordinate: coordinate } });
            } else {
                worker.postMessage({ id: id, type: type, payload: null });
            }
            return id;
        };

        self.worldgenPollResult = function(id) {
            if (id in results) {
                var value = results[id];
                delete results[id];
                return { done: true, value: value, error: null };
            }
            if (id in errors) {
                var value = errors[id];
                delete errors[id];
                return { done: true, value: null, error: value };
            }
            return { done: false, value: null, error: null };
        };
    })();

</script>

</body>

<footer>
    <script type="application/javascript" src="minter.js"></script>
</footer>

</html>
